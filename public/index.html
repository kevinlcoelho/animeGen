<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="animeIndicatorIcon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Site criado para indicar animes baseado nos animes mais avaliados do MyAnimeList. Podendo ser gerado com diversos gêneros ou com algum gênero específico, o site tem como objetivo ajudar os usuários a encontrar animes de qualidade para assistir."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Anime Insight</title>

    <style>
      body {
        background-color: var(--fundo-principal);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        min-height: 100vh;
        overflow-y: flex;
      }
      .skeleton-wrapper {
        width: 100%;
        max-width: 1200px;
        padding: 20px;
        display: flex;
        gap: 15px;
        justify-content: center;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .skel-card {
        flex: 1;
        min-width: 200px;
        height: 350px;
        background: #070046;
        border-radius: 10px;
        padding: 10px;
      }
      .skel-img {
        width: 100%;
        aspect-ratio: 2/3;
        background: linear-gradient(
          90deg,
          #070046 25%,
          #1a0066 50%,
          #070046 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite linear;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root">
      <div class="pagina-centralizada">
        <div class="painel-principal">
          <div class="topo-painel">
            <h1 style="opacity: 0.3">Carregando...</h1>
          </div>
          <div class="containerAnime">
            <div class="cardAnime">
              <div class="skeleton-loading skeleton-img-placeholder"></div>
              <div
                class="skeleton-loading skeleton-title-en"
                style="height: 20px; width: 80%; margin: 10px auto"
              ></div>
              <div
                class="skeleton-loading skeleton-title-jp"
                style="height: 12px; width: 50%; margin: 5px auto"
              ></div>
            </div>
            <div class="cardAnime">
              <div class="skeleton-loading skeleton-img-placeholder"></div>
              <div
                class="skeleton-loading skeleton-title-en"
                style="height: 20px; width: 80%; margin: 10px auto"
              ></div>
              <div
                class="skeleton-loading skeleton-title-jp"
                style="height: 12px; width: 50%; margin: 5px auto"
              ></div>
            </div>
            <div class="cardAnime">
              <div class="skeleton-loading skeleton-img-placeholder"></div>
              <div
                class="skeleton-loading skeleton-title-en"
                style="height: 20px; width: 80%; margin: 10px auto"
              ></div>
              <div
                class="skeleton-loading skeleton-title-jp"
                style="height: 12px; width: 50%; margin: 5px auto"
              ></div>
            </div>
            <div class="cardAnime">
              <div class="skeleton-loading skeleton-img-placeholder"></div>
              <div
                class="skeleton-loading skeleton-title-en"
                style="height: 20px; width: 80%; margin: 10px auto"
              ></div>
              <div
                class="skeleton-loading skeleton-title-jp"
                style="height: 12px; width: 50%; margin: 5px auto"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
