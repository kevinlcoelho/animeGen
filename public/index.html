<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="animeIndicatorIcon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <title>Anime Insight</title>
    <meta
      name="description"
      content="Site criado para indicar animes baseado nos animes mais avaliados do MyAnimeList. Encontre animes de qualidade com filtros por gênero e recomendações inteligentes."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://animeinsight.vercel.app/" />
    <meta
      property="og:title"
      content="Anime Insight | Recomendador de Animes"
    />
    <meta
      property="og:description"
      content="Descubra novos animes baseados nos melhores rankings do MyAnimeList. Um projeto feito para otimizar sua próxima escolha."
    />

    <meta
      property="og:image"
      content="https://animeinsight.vercel.app/thumb-preview.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:image"
      content="https://animeinsight.vercel.app/thumb-preview.png"
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <style>
      body {
        background-color: var(--fundo-principal);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        min-height: 100vh;
        overflow-y: flex;
      }
      .skeleton-wrapper {
        width: 100%;
        max-width: 1200px;
        padding: 20px;
        display: flex;
        gap: 15px;
        justify-content: center;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .skel-card {
        flex: 1;
        min-width: 200px;
        height: 350px;
        background: #070046;
        border-radius: 10px;
        padding: 10px;
      }
      .skel-img {
        width: 100%;
        aspect-ratio: 2/3;
        background: linear-gradient(
          90deg,
          #070046 25%,
          #1a0066 50%,
          #070046 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite linear;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root">
      <div class="pagina-centralizada">
        <div class="painel-principal">
          <div class="topo-painel">
            <h1 style="opacity: 0.3">Carregando...</h1>
          </div>
          <div class="containerAnime">
            <div class="cardAnime">
              <div class="skeleton-loading skeleton-img-placeholder"></div>
              <div
                class="skeleton-loading skeleton-title-en"
                style="height: 20px; width: 80%; margin: 10px auto"
              ></div>
              <div
                class="skeleton-loading skeleton-title-jp"
                style="height: 12px; width: 50%; margin: 5px auto"
              ></div>
            </div>
            <div class="cardAnime">
              <div class="skeleton-loading skeleton-img-placeholder"></div>
              <div
                class="skeleton-loading skeleton-title-en"
                style="height: 20px; width: 80%; margin: 10px auto"
              ></div>
              <div
                class="skeleton-loading skeleton-title-jp"
                style="height: 12px; width: 50%; margin: 5px auto"
              ></div>
            </div>
            <div class="cardAnime">
              <div class="skeleton-loading skeleton-img-placeholder"></div>
              <div
                class="skeleton-loading skeleton-title-en"
                style="height: 20px; width: 80%; margin: 10px auto"
              ></div>
              <div
                class="skeleton-loading skeleton-title-jp"
                style="height: 12px; width: 50%; margin: 5px auto"
              ></div>
            </div>
            <div class="cardAnime">
              <div class="skeleton-loading skeleton-img-placeholder"></div>
              <div
                class="skeleton-loading skeleton-title-en"
                style="height: 20px; width: 80%; margin: 10px auto"
              ></div>
              <div
                class="skeleton-loading skeleton-title-jp"
                style="height: 12px; width: 50%; margin: 5px auto"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
